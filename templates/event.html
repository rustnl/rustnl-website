<section>
  <article id="{{ key }}">
    <h2>{{ event.title }}</h2>
    {{ event.content | safe }}
    {% if event.extra.link %}
    <p>
      <a href="{{ event.extra.link }}">
        <img src="{{ event.extra.image }}" style="display:block;margin:2rem auto;max-width:100%"/>
      </a>
    </p>
    {% endif %}
  </article>
</section>
